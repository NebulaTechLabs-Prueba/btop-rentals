name: Deploy a Hetzner

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-hetzner
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy por SSH (git pull + build + PM2)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/btop
            git pull --ff-only origin main
            # Secrets del frontend (Vite los hornea en el build). Se reescriben cada deploy.
            cat > .env.local <<EOF
            VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
            EOF
            npm ci
            npm run build
            # --update-env para que PM2 relea el entorno; si no existe aún, lo arranca.
            pm2 restart btop-rentals --update-env || pm2 start ecosystem.config.cjs
            pm2 save
