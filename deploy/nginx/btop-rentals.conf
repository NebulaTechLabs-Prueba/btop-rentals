# BTOP Rentals — Nginx site config (static SPA)
# Place at: /etc/nginx/sites-available/btop-rentals.conf
# Enable:   ln -s /etc/nginx/sites-available/btop-rentals.conf /etc/nginx/sites-enabled/
# Then run certbot (see DEPLOY-HETZNER.md); it injects the TLS/443 block automatically.
#
# Replace  your-domain.com  with the real domain before enabling.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com www.your-domain.com;

    root /var/www/btop-rentals;
    index index.html;

    # Gzip (built JS/CSS compress well)
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed build assets — safe to cache forever (filenames change on each build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route serves index.html so client-side views work on refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html must never be cached, so new deploys are picked up immediately
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
